# =============================================================================
# WHAT  : Python tooling config (linter, formatter, test runner).
# WHY   : Keep code style consistent across all .py files automatically.
# HOW   : `make format` and `make lint` use these settings.
# =============================================================================

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]  # Black handles line length

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra --strict-markers"
markers = [
    "e2e: marks tests as end-to-end (deselect with '-m \"not e2e\"')",
    "cloud: requires live GCP project",
]
